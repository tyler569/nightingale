name: Build nightingale

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache the APT packages to skip heavy LLVM downloads
      - name: Cache LLVM and OS Dependencies
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-llvm-21

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make cmake ninja-build ruby xorriso mtools qemu-system-x86 wget lld
          
          # Only run the heavy script if cache misses
          if [ "${{ steps.cache-llvm.outputs.cache-hit }}" != "true" ]; then
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 21
          else
            # Install it from the cached packages directly
            sudo apt-get install -y clang-21 lld-21
          fi

      - name: build
        env:
          CC: clang-21
          ASM: clang-21

        run: |
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=toolchain/CMake/CMakeToolchain.txt
          cmake --build build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nightingale-iso
          path: build/ngos.iso

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/ngos.iso
